<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-label="GhostRing Ring -1 architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="gr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff7b00"/>
    </linearGradient>
    <linearGradient id="kern" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f81f7"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="user" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="hw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#484f58"/>
      <stop offset="100%" stop-color="#30363d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .t  { font-family: -apple-system, Segoe UI, Inter, sans-serif; fill: #c9d1d9; }
      .tt { font-weight: 800; letter-spacing: -0.02em; }
      .mono { font-family: ui-monospace, Menlo, Consolas, monospace; }
      .muted { fill: #8b949e; }
      .warn  { fill: #ffa657; }
      .ring  { fill: none; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>

  <!-- Left: product identity -->
  <g transform="translate(60,80)">
    <text class="t tt" x="0" y="0" font-size="64" fill="#e6edf3">GhostRing</text>
    <text class="t" x="0" y="40" font-size="20" fill="#8b949e">Hypervisor-based endpoint security</text>

    <g transform="translate(0,80)">
      <text class="t tt" x="0" y="0" font-size="26" fill="url(#gr)">Ring −1</text>
      <text class="t" x="110" y="0" font-size="20" fill="#c9d1d9">runs beneath the kernel</text>

      <text class="t" x="0" y="40" font-size="16" fill="#c9d1d9">
        <tspan x="0" dy="0">• Invisible to rootkits and AV evasion tooling</tspan>
        <tspan x="0" dy="22">• Hardware-enforced (Intel VT-x / AMD-V + EPT/NPT)</tspan>
        <tspan x="0" dy="22">• 19 detectors: DKOM · MSR guard · IDT/SSDT · ROP · token</tspan>
        <tspan x="0" dy="22">• Exitless monitoring via VMFUNC — ~134 cycles per switch</tspan>
      </text>
    </g>

    <g transform="translate(0,280)">
      <rect x="0" y="0" width="120" height="26" rx="13" fill="#21262d" stroke="#30363d"/>
      <text class="t mono" x="60" y="18" font-size="12" text-anchor="middle" fill="#c9d1d9">Apache-2.0</text>
      <rect x="132" y="0" width="120" height="26" rx="13" fill="#21262d" stroke="#30363d"/>
      <text class="t mono" x="192" y="18" font-size="12" text-anchor="middle" fill="#c9d1d9">C99 · x86-64</text>
      <rect x="264" y="0" width="140" height="26" rx="13" fill="#21262d" stroke="#30363d"/>
      <text class="t mono" x="334" y="18" font-size="12" text-anchor="middle" fill="#c9d1d9">Linux · Windows</text>
    </g>
  </g>

  <!-- Right: ring stack diagram -->
  <g transform="translate(720,60)">
    <!-- Ring 3 / userspace -->
    <rect x="0" y="0" width="420" height="58" rx="10" fill="url(#user)" opacity="0.95"/>
    <text class="t tt" x="20" y="26" font-size="16" fill="#0d1117">Ring 3 — Userspace</text>
    <text class="t mono" x="20" y="46" font-size="12" fill="#0d1117">browser · editor · agent.exe</text>

    <!-- Ring 0 / kernel -->
    <rect x="0" y="78" width="420" height="70" rx="10" fill="url(#kern)" opacity="0.95"/>
    <text class="t tt" x="20" y="104" font-size="16" fill="#ffffff">Ring 0 — OS Kernel</text>
    <text class="t mono" x="20" y="126" font-size="12" fill="#e6edf3">syscalls · drivers · paging · schedulers</text>
    <text class="t mono" x="20" y="140" font-size="11" fill="#ffa657">  ← rootkits live here, fighting AV in the same ring</text>

    <!-- Ring -1 / GhostRing -->
    <rect x="-10" y="168" width="440" height="90" rx="14" fill="url(#gr)" filter="url(#glow)"/>
    <text class="t tt" x="20" y="198" font-size="20" fill="#0d1117">Ring −1 — GhostRing Hypervisor</text>
    <text class="t mono" x="20" y="222" font-size="12" fill="#0d1117">VT-x root · EPT · #VE · VMFUNC · MSR/CR guards</text>
    <text class="t mono" x="20" y="240" font-size="12" fill="#0d1117">VM-exits intercept rootkit behaviour transparently</text>

    <!-- Hardware -->
    <rect x="0" y="278" width="420" height="60" rx="10" fill="url(#hw)" opacity="0.95"/>
    <text class="t tt" x="20" y="304" font-size="16" fill="#c9d1d9">Hardware — CPU · MMU · IOMMU</text>
    <text class="t mono" x="20" y="324" font-size="12" fill="#8b949e">13th gen Intel · AMD Zen · HLAT · SPP · Intel PT</text>

    <!-- Arrow: rootkit attempt blocked -->
    <g transform="translate(310,132)">
      <circle cx="0" cy="0" r="14" fill="#f85149"/>
      <text class="t tt" x="0" y="5" font-size="13" text-anchor="middle" fill="#fff">✕</text>
      <text class="t" x="22" y="5" font-size="11" fill="#ffa657">rootkit</text>
    </g>
    <path d="M 318 140 Q 330 170 330 192" stroke="#f85149" stroke-width="2" fill="none" stroke-dasharray="3,3"/>
  </g>

  <!-- Byline -->
  <text class="t muted" x="60" y="450" font-size="12">© 2026 Baurzhan Atynov · bauratynov@gmail.com</text>
</svg>
